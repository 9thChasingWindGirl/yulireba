name: releaser

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    runs-on: windows-latest

    env:
      APP_NAME: YuLiReBa
      ZIP_FILE: YuLiReBa-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      # Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
          cache: true

      # pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Check versions
        run: |
          node -v
          go version

      # 前端构建
      - name: Build frontend
        run: |
          cd frontend
          pnpm install
          pnpm build

      # 安装 Wails（固定版本更稳）
      - name: Install Wails CLI
        run: |
          # 确保使用正确的 Go bin 目录
          $env:Path = "$env:USERPROFILE\go\bin;$env:Path"
          # 卸载可能存在的旧版本
          go clean -cache
          # 安装指定版本
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          # 验证版本
          & "$env:USERPROFILE\go\bin\wails.exe" version

      # Go 依赖
      - name: Go mod
        run: |
          go mod tidy
          go mod download

      # 构建（✅ 使用 embed）
      - name: Build App
        run: |
          $env:Path = "$env:USERPROFILE\go\bin;$env:Path"
          & "$env:USERPROFILE\go\bin\wails.exe" build -m -trimpath -tags with_gvisor,with_clash_api -webview2 embed -o ${{ env.APP_NAME }}.exe

      # 压缩
      - name: Compress
        run: |
          cd build/bin
          Compress-Archive -Path ${{ env.APP_NAME }}.exe -DestinationPath ${{ env.ZIP_FILE }}

      # 上传 Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: ./build/bin/${{ env.ZIP_FILE }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-windows
          path: ./artifacts

      - name: List files
        run: ls -R ./artifacts

      - name: Create Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./artifacts/YuLiReBa-windows-amd64.zip
          asset_name: YuLiReBa-windows-amd64.zip
          tag: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          overwrite: true
          draft: false
          prerelease: contains(github.ref_name, 'beta')
          body: |
            Auto-generated release from GitHub Actions.

            ## 功能特性
            - 基于 sing-box 内核的游戏加速
            - 支持订阅链接解析（Clash/sing-box 格式）
            - 支持本地节点文件读取
            - 预留 Supabase 账户系统
            - Windows 平台支持

            ## 运行说明
            - 已内置 WebView2 Runtime（无需额外安装）

            ## 版本信息
            - 版本：${{ github.ref_name }}
            - 构建ID：${{ github.run_id }}

            ## 使用说明
            1. 下载压缩包
            2. 解压运行 YuLiReBa.exe